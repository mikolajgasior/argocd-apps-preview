---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: tools
spec:
  project: default
  source:
    repoURL: https://github.com/keenbytes/apps-of-apps-example
    targetRevision: HEAD
    path: app/root
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: {}